name: Build and Push to DockerHub

on:
  push:
    branches:
      - main  # Jab bhi tum main branch par code push karogi, yeh pipeline khud chal jayegi

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # GitHub hamein ek free Linux server dega pipeline chalane ke liye

    steps:
    # 1. Tumhara code GitHub runner ke andar download hoga
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. DockerHub par securely login karenge
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Docker image banegi aur DockerHub par push ho jayegi
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/modern-python-app:latest

 deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Yeh tabhi chalega jab upar wala job successfully pass ho jayega
    steps:
      - name: Deploying to AWS EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Purane container ko stop aur remove karo agar wo chal raha hai toh
            docker stop my-app-container || true
            docker rm my-app-container || true
            
            # 2. DockerHub se ekदम fresh image pull karo
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/modern-python-app:latest
            
            # 3. Naya container run karo
            # (Note: Agar port pata ho toh 80:80 ki jagah apna port change kar lena, abhi ke liye standard port 80 hai)
            docker run -d --name my-app-container -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/modern-python-app:latest
